# azure-pipelines.yml
trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - "*.md"

pr:
  branches:
    include:
      - main

variables:
  - group: bookified-vars
  - name: NODE_VERSION
    value: "20.x"
  - name: NEXT_TELEMETRY_DISABLED
    value: "1"
  - name: npm_config_cache
    value: "$(Pipeline.Workspace)/.npm"

stages:
  # ─────────────────────────────────────────
  # STAGE 1: Install & Lint
  # ─────────────────────────────────────────
  - stage: Lint
    displayName: "Lint & Type Check"
    jobs:
      - job: LintJob
        displayName: "ESLint + TypeScript"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: "Install Node.js"

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)
            displayName: "Cache npm packages"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run lint
            displayName: "Run ESLint"
            continueOnError: false

          - script: npx tsc --noEmit
            displayName: "TypeScript type check"
            continueOnError: false

  # ─────────────────────────────────────────
  # STAGE 2: Build
  # ─────────────────────────────────────────
  - stage: Build
    displayName: "Build Application"
    dependsOn: Lint
    condition: succeeded()
    jobs:
      - job: BuildJob
        displayName: "Next.js Build"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: "Install Node.js"

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)
            displayName: "Cache npm packages"

          - script: npm ci
            displayName: "Install dependencies"

          - script: |
              echo "MONGODB_URI=$(MONGODB_URI)" >> .env.production
              echo "NEXT_PUBLIC_VAPI_API_KEY=$(NEXT_PUBLIC_VAPI_API_KEY)" >> .env.production
              echo "NEXT_PUBLIC_ASSISTANT_ID=$(NEXT_PUBLIC_ASSISTANT_ID)" >> .env.production
              echo "BLOB_READ_WRITE_TOKEN=$(BLOB_READ_WRITE_TOKEN)" >> .env.production
              echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY)" >> .env.production
              echo "CLERK_SECRET_KEY=$(CLERK_SECRET_KEY)" >> .env.production
            displayName: "Create .env.production"

          - script: npm run build
            displayName: "Build Next.js app"
            env:
              NEXT_TELEMETRY_DISABLED: 1

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: "$(Build.SourcesDirectory)"
              includeRootFolder: false
              archiveType: "zip"
              archiveFile: "$(Build.ArtifactStagingDirectory)/bookified.zip"
              replaceExistingArchive: true
            displayName: "Archive build artifacts"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "bookified-build"
              publishLocation: "Container"
            displayName: "Publish artifacts"

  # ─────────────────────────────────────────
  # STAGE 3: Deploy to Staging
  # ─────────────────────────────────────────
  - stage: DeployStaging
    displayName: "Deploy to Staging"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployStaging
        displayName: "Deploy to Azure App Service (Staging)"
        pool:
          vmImage: "ubuntu-latest"
        environment: "staging"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: bookified-build
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: "bookified-service-connection"
                    appName: "bookified-staging"
                    appType: "webAppLinux"
                    package: "$(Pipeline.Workspace)/bookified-build/bookified.zip"
                    runtimeStack: "NODE|20-lts"
                    startUpCommand: "npm start"
                  displayName: "Deploy to staging slot"

  # ─────────────────────────────────────────
  # STAGE 4: Deploy to Production
  # ─────────────────────────────────────────
  - stage: DeployProduction
    displayName: "Deploy to Production"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProduction
        displayName: "Deploy to Azure App Service (Production)"
        pool:
          vmImage: "ubuntu-latest"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: bookified-build
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: "bookified-service-connection"
                    appName: "bookified-prod-aksh"
                    appType: "webAppLinux"
                    package: "$(Pipeline.Workspace)/bookified-build/bookified.zip"
                    runtimeStack: "NODE|20-lts"
                    startUpCommand: "npm start"
                  displayName: "Deploy to production"
