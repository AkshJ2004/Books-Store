name: Deploy Bookified to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "22.x"
  AZURE_WEBAPP_NAME: bookified-prod

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          cat > .env.production << EOF
          NODE_ENV=production
          NEXT_TELEMETRY_DISABLED=1
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          BLOB_READ_WRITE_TOKEN=${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NEXT_PUBLIC_VAPI_API_KEY=${{ secrets.NEXT_PUBLIC_VAPI_API_KEY }}
          NEXT_PUBLIC_ASSISTANT_ID=${{ secrets.NEXT_PUBLIC_ASSISTANT_ID }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/
          EOF

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NEXT_PUBLIC_VAPI_API_KEY: ${{ secrets.NEXT_PUBLIC_VAPI_API_KEY }}
          NEXT_PUBLIC_ASSISTANT_ID: ${{ secrets.NEXT_PUBLIC_ASSISTANT_ID }}

      - name: Prepare deployment package
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

          cat > .next/standalone/startup.sh << 'STARTUPEOF'
          #!/bin/bash
          export PORT=8080
          node server.js
          STARTUPEOF
          chmod +x .next/standalone/startup.sh

          cat > .next/standalone/package.json << 'PKGEOF'
          {
            "name": "bookified",
            "version": "1.0.0",
            "scripts": {
              "start": "node server.js"
            },
            "engines": {
              "node": ">=22.0.0"
            }
          }
          PKGEOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookified-build
          path: .next/standalone/
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://bookified-prod.azurewebsites.net

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: bookified-build
          path: ./deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
